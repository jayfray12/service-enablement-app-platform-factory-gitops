{{- if .Values.gitopsOperator.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-operator
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: gitops-operator
    app.kubernetes.io/part-of: etx-lab-infra
    demo.redhat.com/infra: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: {{ .Values.gitopsOperator.git.repoURL }}
    targetRevision: {{ .Values.gitopsOperator.git.targetRevision }}
    path: {{ .Values.gitopsOperator.git.path }}
    helm:
      values: |
        namespace:
          name: {{ .Values.gitopsOperator.namespace }}
        subscription:
          channel: {{ .Values.gitopsOperator.channel }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.gitopsOperator.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
