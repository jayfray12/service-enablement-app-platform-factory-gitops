{{- if .Values.etxGitops.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: etx-gitops-oidc-secret
  namespace: {{ .Values.etxGitops.namespace }}
  labels:
    app.kubernetes.io/name: etx-gitops-oidc-secret
    app.kubernetes.io/part-of: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  clientSecret: {{ .Values.etxGitops.sso.clientSecret | quote }}
{{- end }}
