{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: vault-secrets-operator
    app.kubernetes.io/instance: vault-secrets-operator
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: etx-lab-infrastructure
    demo.redhat.com/infra: "true"
  annotations:
    description: "HashiCorp Vault Secrets Operator - cluster-wide secrets management"
{{- end }}