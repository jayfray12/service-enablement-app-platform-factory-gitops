apiVersion: batch/v1
kind: Job
metadata:
  name: etx-gitops-cluster-secret-sync
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      name: cluster-secret-sync
    spec:
      serviceAccountName: etx-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
      - name: patch-secret
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          echo "Waiting for cluster secret to be created by operator..."
          retries=30
          delay=5
          for i in $(seq 1 $retries); do
            if oc get secret etx-gitops-default-cluster-config -n {{ .Values.namespace }} >/dev/null 2>&1; then
              echo "Cluster secret found"
              break
            fi

            if [ $i -eq $retries ]; then
              echo "ERROR: Cluster secret not found after ${retries} attempts"
              exit 1
            fi

            echo "Attempt $i/${retries}: Waiting ${delay}s..."
            sleep $delay
          done

          echo "Patching cluster secret with all sourceNamespaces..."
          NAMESPACES_B64=$(echo -n "{{ .Values.namespace }},etx-keycloak,gitlab,vault,quay" | base64 -w 0)

          oc patch secret etx-gitops-default-cluster-config \
            -n {{ .Values.namespace }} \
            --type merge \
            -p "{\"data\":{\"namespaces\":\"${NAMESPACES_B64}\"}}"

          echo "Cluster secret successfully updated"

          # Verify the patch
          ACTUAL=$(oc get secret etx-gitops-default-cluster-config \
            -n {{ .Values.namespace }} \
            -o jsonpath='{.data.namespaces}' | base64 -d)

          echo "Cluster secret now contains: ${ACTUAL}"

          # Restart application controller to pick up changes
          echo "Restarting application controller..."
          oc delete pod -n {{ .Values.namespace }} \
            -l app.kubernetes.io/name=etx-gitops-application-controller \
            --ignore-not-found=true

          echo "Done"
