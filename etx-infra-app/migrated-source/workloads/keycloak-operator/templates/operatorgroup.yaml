{{- if .Values.operatorGroup.create }}
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: etx-keycloak-operator-group
  namespace: {{ .Values.namespace }}
  annotations:
    description: "Scoped to etx-keycloak namespace only - isolated from cluster's default SSO"
spec:
  targetNamespaces:
  {{- range .Values.operatorGroup.targetNamespaces }}
  - {{ . }}
  {{- end }}
{{- end }}
