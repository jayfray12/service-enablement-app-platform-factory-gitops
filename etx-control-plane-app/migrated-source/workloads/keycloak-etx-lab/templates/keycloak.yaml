apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: etx-keycloak
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: etx-keycloak
    app.kubernetes.io/instance: etx-keycloak
    app.kubernetes.io/part-of: etx-lab-platform
    demo.redhat.com/platform: "true"
  annotations:
    description: "ETX Lab Keycloak - isolated from cluster's default SSO"
spec:
  instances: {{ .Values.instance.replicas }}
  db:
    vendor: postgres
    host: etx-keycloak-postgres
    port: 5432
    database: keycloak
    usernameSecret:
      name: etx-keycloak-db-secret
      key: username
    passwordSecret:
      name: etx-keycloak-db-secret
      key: password
  hostname:
    hostname: {{ .Values.instance.hostname }}
  http:
    httpEnabled: true
  proxy:
    headers: xforwarded  # Trust X-Forwarded-* headers from OpenShift route
  ingress:
    enabled: false  # Using OpenShift Route for TLS termination
