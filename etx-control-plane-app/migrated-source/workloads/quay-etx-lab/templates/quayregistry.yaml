apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: quay-registry
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: quay-registry
    app.kubernetes.io/part-of: etx-lab-platform
    demo.redhat.com/platform: "true"
spec:
  components:
    - kind: postgres
      managed: true
    - kind: clair
      managed: true
    - kind: redis
      managed: true
    - kind: objectstorage
      managed: true
    - kind: route
      managed: true
    - kind: mirror
      managed: true
    - kind: quay
      managed: true
    - kind: horizontalpodautoscaler
      managed: true
    - kind: monitoring
      managed: false
    - kind: tls
      managed: true
    - kind: clairpostgres
      managed: true
  configBundleSecret: quay-config-bundle
