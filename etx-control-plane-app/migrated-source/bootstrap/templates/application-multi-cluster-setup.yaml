{{- if .Values.multiClusterSetup.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etx-multi-cluster-setup
  namespace: {{ .Values.gitops.namespace }}
  labels:
    app.kubernetes.io/name: etx-multi-cluster-setup
    app.kubernetes.io/part-of: etx-lab-platform
    demo.redhat.com/platform: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: {{ .Values.multiClusterSetup.git.repoURL }}
    targetRevision: {{ .Values.multiClusterSetup.git.targetRevision }}
    path: {{ .Values.multiClusterSetup.git.path }}
    helm:
      values: |
        primaryCluster:
          {{- toYaml .Values.multiClusterSetup.primaryCluster | nindent 10 }}
        secondaryCluster:
          {{- toYaml .Values.multiClusterSetup.secondaryCluster | nindent 10 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.gitops.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
